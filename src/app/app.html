<header class="app-header">
  <div class="brand">
    <strong>Web Messenger</strong>
    <span>Chat seguro em tempo real</span>
  </div>

  <nav class="app-nav">
    <a routerLink="/">Home</a>
    @if (!isAuthenticated()) {
    <a routerLink="/login">Login</a>
    <a routerLink="/register">Registrar</a>
    } @else {
    <a routerLink="/dashboard">Painel</a>
    <button class="text-button" type="button" (click)="logout()">Sair</button>
    }
  </nav>
</header>

<main class="app-main">
  <router-outlet></router-outlet>
</main>
